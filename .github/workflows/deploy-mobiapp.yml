# Deploy mobiapp to Cloud Run. Repository secret: GCP_SA_KEY (service account JSON).
name: Deploy mobiapp (Cloud Run)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: mobi-backend-491410
  REGION: asia-south1
  SERVICE: mobiapp
  IMAGE: gcr.io/mobi-backend-491410/mobiapp

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CLOUDSDK_CORE_DISABLE_PROMPTS: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Dockerfile lives under ./mobiapp; tag matches Cloud Run image.
      - name: Build and push image
        run: |
          gcloud builds submit ./mobiapp \
            --tag ${{ env.IMAGE }} \
            --project ${{ env.PROJECT_ID }} \
            --quiet

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --project ${{ env.PROJECT_ID }} \
            --quiet

      - name: Print Cloud Run service URL
        run: |
          gcloud run services describe "${{ env.SERVICE }}" \
            --region="${{ env.REGION }}" \
            --project="${{ env.PROJECT_ID }}" \
            --format='value(status.url)'
