# Submit from repo root:
#   gcloud builds submit ./mobiapp --config mobiapp/cloudbuild.yaml --project=YOUR_PROJECT_ID
# $PROJECT_ID is provided by Cloud Build. Image lives in Artifact Registry (us-central1), not gcr.io.
#
# Create the Docker repo if needed:
#   gcloud artifacts repositories create mobi-repo --repository-format=docker --location=us-central1 --project=PROJECT_ID
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mobi-repo/mobiapp:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/mobi-repo/mobiapp:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'mobiapp'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/mobi-repo/mobiapp:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--project=$PROJECT_ID'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=8080'
      - '--timeout=60'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/mobi-repo/mobiapp:latest'
